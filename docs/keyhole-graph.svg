<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="bg" cx="20%" cy="-10%" r="120%">
      <stop offset="0%" stop-color="#2a1f5e"/>
      <stop offset="55%" stop-color="#0e0b1f"/>
    </radialGradient>
  </defs>
  <rect width="820" height="440" rx="16" fill="url(#bg)"/>
  <text x="32" y="42" fill="#9a93c4" font-size="13" letter-spacing="1.5">🕸️ РЕПУТАЦИОННЫЙ ГРАФ — БАЛЛ ДОВЕРИЯ ИЗ ИСТОРИИ СДЕЛОК</text>

  <!-- Рёбра (под узлами) -->
  <g stroke="#8b7cff" stroke-opacity="0.35">
    <line x1="410" y1="120" x2="600" y2="230" stroke-width="3"/>
    <line x1="410" y1="120" x2="230" y2="230" stroke-width="2"/>
    <line x1="600" y1="230" x2="500" y2="370" stroke-width="2"/>
    <line x1="230" y1="230" x2="320" y2="370" stroke-width="3"/>
    <line x1="410" y1="120" x2="500" y2="370" stroke-width="1.5"/>
    <line x1="230" y1="230" x2="600" y2="230" stroke-width="1.5"/>
  </g>

  <!-- Узлы: цвет/размер по репутации -->
  <g stroke="rgba(255,255,255,.25)" stroke-width="1.5">
    <circle cx="410" cy="120" r="30" fill="#3ddc97" fill-opacity="0.85"/>
    <circle cx="600" cy="230" r="27" fill="#3ddc97" fill-opacity="0.85"/>
    <circle cx="230" cy="230" r="22" fill="#8b7cff" fill-opacity="0.85"/>
    <circle cx="320" cy="370" r="18" fill="#ff6b8a" fill-opacity="0.85"/>
    <circle cx="500" cy="370" r="24" fill="#8b7cff" fill-opacity="0.85"/>
  </g>

  <!-- Подписи -->
  <g fill="#e8e6f5" font-size="13" font-weight="600" text-anchor="middle">
    <text x="410" y="78">ShopperBot</text>
    <text x="600" y="195">SupplierBot</text>
    <text x="230" y="200">DataAgent</text>
    <text x="320" y="345">RiskyBot</text>
    <text x="500" y="338">CloudAgent</text>
  </g>
  <g fill="#c9c3ea" font-size="11" text-anchor="middle">
    <text x="410" y="125">88</text>
    <text x="600" y="235">81</text>
    <text x="230" y="235">62</text>
    <text x="320" y="375">34</text>
    <text x="500" y="375">57</text>
  </g>
  <text x="320" y="408" fill="#ff6b8a" font-size="10" text-anchor="middle">⚖️ 1 спор</text>

  <!-- Легенда -->
  <g font-size="11" fill="#9a93c4">
    <circle cx="40" cy="418" r="5" fill="#3ddc97"/><text x="52" y="422">высокое доверие (70+)</text>
    <circle cx="210" cy="418" r="5" fill="#8b7cff"/><text x="222" y="422">среднее (40–69)</text>
    <circle cx="330" cy="418" r="5" fill="#ff6b8a"/><text x="342" y="422">низкое (&lt;40)</text>
    <text x="470" y="422">размер узла = репутация · линия = сделка между агентами</text>
  </g>
</svg>
